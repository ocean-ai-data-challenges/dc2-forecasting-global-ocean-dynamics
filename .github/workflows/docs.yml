# Publish leaderboard map_data assets and trigger ReadTheDocs rebuild.
#
# Workflow:
#   1. Evaluation run generates docs/source/_extra/leaderboard/map_data/
#   2. Developer runs:  python docs/scripts/pack_map_data.py
#      → produces docs/source/_extra/leaderboard/map_data.tar.gz
#   3. Any push to main touching docs/ uploads release assets automatically:
#      - map_data.tar.gz (stable)
#      - map_data-${GITHUB_SHA}.tar.gz (commit-pinned)
#      Upload is performed only when map_data.tar.gz exists in the checked-out
#      commit; otherwise the job is skipped (no stale republish, no hard fail).
#   4. The workflow then triggers a ReadTheDocs rebuild.
#
# ReadTheDocs downloads the latest release asset during its pre-build step
# (see .readthedocs.yaml).
#
# Required repository secrets:
#   RTD_WEBHOOK_URL  – ReadTheDocs generic API incoming webhook URL
#                      (ReadTheDocs → Admin → Integrations → Generic webhook)

name: Publish Leaderboard Data & Rebuild Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "dc2/**"
      - ".readthedocs.yaml"
  workflow_dispatch:

jobs:
  # --- Job 1: Upload the map_data archive as a GitHub Release asset ----------
  upload-leaderboard-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # needed to create/update releases
    steps:
      - uses: actions/checkout@v4

      - name: Detect leaderboard archive
        id: detect_archive
        run: |
          if [ -f docs/source/_extra/leaderboard/map_data.tar.gz ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip upload (archive missing)
        if: steps.detect_archive.outputs.exists != 'true'
        run: |
          echo "No docs/source/_extra/leaderboard/map_data.tar.gz in this commit."
          echo "Skipping release upload to avoid republishing stale map data."

      - name: Create or update release
        if: steps.detect_archive.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="leaderboard-data"
          SOURCE_ARCHIVE="docs/source/_extra/leaderboard/map_data.tar.gz"

          # Create the release if it doesn't exist
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" \
              --title "Leaderboard map data" \
              --notes "Auto-updated archive of leaderboard visualisation data (map_data/)." \
              --latest=false

          # Upload (overwrite if exists)
          gh release upload "$TAG" \
            "$SOURCE_ARCHIVE#map_data.tar.gz" \
            --clobber

          # Also upload a commit-pinned asset so RTD can fetch data matching
          # the exact docs commit when available.
          SHA_ASSET="map_data-${GITHUB_SHA}.tar.gz"
          cp "$SOURCE_ARCHIVE" "$SHA_ASSET"
          gh release upload "$TAG" "$SHA_ASSET" --clobber
          rm -f "$SHA_ASSET"

  # --- Job 2: Trigger ReadTheDocs rebuild -----------------------------------
  trigger-rtd:
    runs-on: ubuntu-latest
    needs: [upload-leaderboard-data]
    if: always() && !failure() && !cancelled()
    steps:
      - name: Trigger ReadTheDocs build
        run: |
          curl -s -X POST -d "" "${{ secrets.RTD_WEBHOOK_URL }}"
