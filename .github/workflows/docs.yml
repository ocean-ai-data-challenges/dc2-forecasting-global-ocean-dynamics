# Publish leaderboard map_data assets and trigger ReadTheDocs rebuild.
#
# Workflow:
#   1. Evaluation run generates docs/source/_extra/leaderboard/map_data/
#   2. Developer runs:  python docs/scripts/pack_map_data.py
#      → produces/updates docs/source/_extra/leaderboard/map_data.tar.gz
#   3. Developer commits and pushes (git-lfs stores the binary automatically):
#        git add docs/source/_extra/leaderboard/map_data.tar.gz
#        git commit -m "chore: update leaderboard map data"
#        git push
#   4. This workflow runs automatically on every qualifying push to main:
#      - Checks out the repo including git-lfs objects (map_data.tar.gz)
#      - Uploads map_data.tar.gz as a stable GitHub Release asset
#      - Uploads a commit-pinned map_data-${GITHUB_SHA}.tar.gz asset
#      - Triggers a ReadTheDocs rebuild
#   5. ReadTheDocs downloads the commit-pinned asset (or the stable fallback)
#      during its pre-build step (see .readthedocs.yaml).
#
# The archive is tracked via git-lfs so it is always present in CI checkouts.
# No external URL variable or manual upload step is required.
#
# Required repository secrets:
#   RTD_WEBHOOK_URL  – ReadTheDocs generic API incoming webhook URL
#                      (ReadTheDocs → Admin → Integrations → Generic webhook)

name: Publish Leaderboard Data & Rebuild Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "dc2/**"
      - ".readthedocs.yaml"
  workflow_dispatch:

jobs:
  # --- Job 1: Upload the map_data archive as a GitHub Release asset ----------
  upload-leaderboard-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # needed to create/update releases
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true            # fetch map_data.tar.gz from git-lfs

      - name: Upload leaderboard archive to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="leaderboard-data"
          ARCHIVE="docs/source/_extra/leaderboard/map_data.tar.gz"

          if [ ! -f "$ARCHIVE" ]; then
            echo "WARNING: $ARCHIVE not found (git-lfs checkout may have failed)."
            echo "Skipping release upload; RTD will use the previous stable asset."
            exit 0
          fi

          # Create the release if it doesn't exist
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" \
              --title "Leaderboard map data" \
              --notes "Auto-updated archive of leaderboard visualisation data (map_data/)." \
              --latest=false

          # Overwrite the stable asset
          gh release upload "$TAG" "$ARCHIVE#map_data.tar.gz" --clobber

          # Upload a commit-pinned asset so RTD can fetch data matching
          # the exact docs commit when available.
          SHA_ASSET="map_data-${GITHUB_SHA}.tar.gz"
          cp "$ARCHIVE" "$SHA_ASSET"
          gh release upload "$TAG" "$SHA_ASSET" --clobber
          rm -f "$SHA_ASSET"

  # --- Job 2: Trigger ReadTheDocs rebuild -----------------------------------
  trigger-rtd:
    runs-on: ubuntu-latest
    needs: [upload-leaderboard-data]
    if: always() && !failure() && !cancelled()
    steps:
      - name: Trigger ReadTheDocs build
        run: |
          curl -s -X POST -d "" "${{ secrets.RTD_WEBHOOK_URL }}"
