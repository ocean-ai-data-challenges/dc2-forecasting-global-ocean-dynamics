  - dataset: swot
    n_parallel_workers: 5
    nthreads_per_worker: 1
    memory_limit_per_worker: "6GB"
    observation_dataset: true
    # SWOT swath files are large (several hundred MB uncompressed per file).
    # Keep batches small to cap the per-batch file set that the driver must
    # prefetch + preprocess.  Each batch covers obs_batch_size evaluations
    # each needing ~time_tolerancex2 = 24 h of files.  With n_days_interval=7
    # the 30 time windows are non-overlapping -> ~30 x unique-files/day files
    # are preprocessed at once on the driver.  10 tasks x ~20 files/day
    # x 8 threads (DCTOOLS_PREP_WORKERS) keeps driver-side RAM below ~2 GB.
    obs_batch_size: 10  # reduced from 30 to limit per-batch SWOT file count
    metrics:
      - "rmsd"
    time_tolerance: 12   # tolerance for matching the observations (hours)
    config: "s3"
    connection_type: "public"
    url: "https://minio.dive.edito.eu"
    s3_bucket: "project-ppr-ocean-ia"
    s3_folder: "DC2/ZARR/Swot"
    s3_key:
    s3_secret_key:
    file_pattern: "**/*.zarr"
    ignore_geometry: true
    keep_variables:
      - "num_pixels"
      - "num_lines"
      - "num_nadir"   # dimension variables
      - "time"
      - "latitude"
      - "longitude"
      - "mdt"
      - "ssha_filtered"
      #- "ssha_unfiltered"
      #- "i_num_line"
      #- "i_num_pixel"
    eval_variables:
      - "ssha_filtered"

