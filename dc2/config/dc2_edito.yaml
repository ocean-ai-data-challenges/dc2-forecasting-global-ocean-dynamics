    config: "s3"
    connection_type: "public"
    url: "https://minio.dive.edito.eu"
    s3_bucket: "project-ppr-ocean-ia"
    s3_folder: "DC2/ZARR/Glorys"
    s3_key:
    s3_secret_key:
    file_pattern: "**/*.zarr"
    full_day_data: true
    ignore_geometry: true
    keep_variables:
      - "salinity"
      - "ssh"
      - "temperature"
      - "u_current"
      - "v_current"
      - "depth"
      - "lat"
      - "lon"
      - "time"
    eval_variables:
      - "salinity"
